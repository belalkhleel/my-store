<section class="success">
  <div class="container">

    <div class="success__card card">

      <div class="success__icon">✓</div>

      <h1>Order Confirmed!</h1>
      <p class="text-muted">Thank you, <span class="text-accent">{{ name }}</span>. Your order has been placed successfully.</p>

      <div class="success__total">
        <span class="text-muted">Total Charged</span>
        <span class="success__amount">${{ total }}</span>
      </div>

      <div class="success__actions">
        <a routerLink="/" class="btn btn-primary">Continue Shopping</a>
      </div>

    </div>

  </div>
</section>
