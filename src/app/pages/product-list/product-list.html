<section class="product-list">
  <div class="container">

    <div class="product-list__header">
      <h1>Our Products</h1>
      <p class="text-muted">Premium gear for your setup</p>
    </div>

    <div *ngIf="feedbackMessage" class="feedback-msg">{{ feedbackMessage }}</div>

    <div class="product-grid" *ngIf="(products$ | async) as products">
      <app-product-card
        *ngFor="let product of products"
        [product]="product"
        (addToCart)="handleAddToCart($event)">
      </app-product-card>
    </div>

  </div>
</section>
