<section class="checkout">
  <div class="container">

    <h1>Checkout</h1>

    <form #checkoutForm="ngForm" (ngSubmit)="onSubmit()" class="checkout__inner">

      <div class="checkout__form">

        <div class="form-section">
          <h2>Shipping Info</h2>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              id="name"
              type="text"
              name="name"
              [(ngModel)]="order.name"
              required
              placeholder="John Doe"
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              [(ngModel)]="order.email"
              required
              placeholder="john@example.com"
            />
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input
              id="address"
              type="text"
              name="address"
              [(ngModel)]="order.address"
              required
              placeholder="123 Main St"
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input
                id="city"
                type="text"
                name="city"
                [(ngModel)]="order.city"
                required
                placeholder="New York"
              />
            </div>
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input
                id="zip"
                type="text"
                name="zip"
                [(ngModel)]="order.zip"
                required
                placeholder="10001"
              />
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>Payment Info</h2>

          <div class="form-group">
            <label for="card">Card Number</label>
            <input
              id="card"
              type="text"
              name="card"
              [(ngModel)]="order.card"
              required
              placeholder="1234 5678 9012 3456"
              maxlength="19"
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="expiry">Expiry Date</label>
              <input
                id="expiry"
                type="text"
                name="expiry"
                [(ngModel)]="order.expiry"
                required
                placeholder="MM/YY"
                maxlength="5"
              />
            </div>
            <div class="form-group">
              <label for="cvv">CVV</label>
              <input
                id="cvv"
                type="text"
                name="cvv"
                [(ngModel)]="order.cvv"
                required
                placeholder="123"
                maxlength="3"
              />
            </div>
          </div>
        </div>

      </div>

      <div class="checkout__summary card">
        <h2>Order Total</h2>
        <hr class="divider"/>
        <div class="summary-row">
          <span class="text-muted">Subtotal</span>
          <span>${{ total }}</span>
        </div>
        <div class="summary-row">
          <span class="text-muted">Shipping</span>
          <span class="text-accent">Free</span>
        </div>
        <hr class="divider"/>
        <div class="summary-row summary-total">
          <span>Total</span>
          <span class="text-accent">${{ total }}</span>
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          style="width:100%; margin-top:24px;"
          [disabled]="checkoutForm.invalid"
        >
          Place Order
        </button>
      </div>

    </form>
  </div>
</section>
